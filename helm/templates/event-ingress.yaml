apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-ingress
  labels: {{- include "event-ingress.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.eventIngress.replicas }}
  selector:
    matchLabels: {{- include "event-ingress.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "event-ingress.labels" . | nindent 8 }}
    spec:
      containers:
		- name: event-ingress
          image: {{ printf "%s:%s" .Values.event-ingress.image.name .Values.event-ingress.image.tag }}
          imagePullPolicy: {{ .Values.eventIngress.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.eventIngress.port }}
              name: http
          resources:
            {{- toYaml .Values.eventIngress.resources | nindent 12 }}

---

apiVersion: v1
kind: Service
metadata:
  name: event-ingress
  labels: {{- include "common.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.eventIngress.port }}
      targetPort: {{ .Values.eventIngress.port }}
      protocol: TCP
      name: http
  selector: {{- include "event-ingress.selectorLabels" . | nindent 4 }}

---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "gateway.route" . }}-event-ingress
spec:
  hostnames:
    - {{ .Values.eventIngress.host }}
  parentRefs:
    - name: {{ include "gateway.fullname" . }}
  rules:
    - backendRefs:
        - name: event-ingress
          port: {{ .Values.eventIngress.port }}


